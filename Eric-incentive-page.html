<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Eric's Incentive Page</title>
  <style>
    :root{
      --bg:#f4f7fb;
      --card:#ffffff;
      --ink:#10233a;
      --muted:#5f7187;
      --line:#dbe4ee;
      --brand:#1f5fa8;
      --brand-2:#4f8fe0;
      --success:#1f9d55;
      --success-2:#51c97f;
      --warn:#f59e0b;
      --danger:#c62828;
      --shadow:0 12px 35px rgba(16,35,58,.10);
      --radius:22px;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      background:linear-gradient(180deg,#eef4fb 0%, #f8fbff 100%);
      color:var(--ink);
    }

    .wrap{
      max-width:1100px;
      margin:0 auto;
      padding:28px 18px 48px;
    }

    .hero{
      background:linear-gradient(135deg,var(--brand),var(--brand-2));
      color:#fff;
      border-radius:30px;
      padding:32px 26px;
      box-shadow:var(--shadow);
      position:relative;
      overflow:hidden;
      min-height:320px;
    }

    .hero::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        radial-gradient(circle at 15% 20%, rgba(255,255,255,.14), transparent 24%),
        radial-gradient(circle at 80% 18%, rgba(255,255,255,.12), transparent 18%),
        radial-gradient(circle at 85% 85%, rgba(255,255,255,.09), transparent 20%);
      pointer-events:none;
    }

    .hero::after{
      content:"";
      position:absolute;
      width:220px;
      height:220px;
      right:-40px;
      top:-40px;
      border-radius:50%;
      background:rgba(255,255,255,.12);
    }

    .hero-inner{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:20px;
      position:relative;
      z-index:2;
    }

    .hero-copy{
      max-width:760px;
      flex:1 1 auto;
    }

    .hero h1{
      margin:0 0 10px;
      font-size:clamp(2rem,4vw,3rem);
      line-height:1.05;
    }

    .hero p{
      margin:0;
      max-width:720px;
      font-size:1.05rem;
      line-height:1.6;
      color:rgba(255,255,255,.95);
    }

    .hero-photo{
      width:128px;
      min-width:128px;
      height:128px;
      border-radius:24px;
      overflow:hidden;
      border:4px solid rgba(255,255,255,.85);
      box-shadow:0 12px 24px rgba(0,0,0,.18);
      background:rgba(255,255,255,.15);
      backdrop-filter:blur(6px);
    }

    .hero-photo img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }

    .hero-badges{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin-top:18px;
    }

    .badge{
      background:rgba(255,255,255,.16);
      border:1px solid rgba(255,255,255,.22);
      color:#fff;
      padding:10px 14px;
      border-radius:999px;
      font-weight:700;
      font-size:.95rem;
      backdrop-filter:blur(4px);
    }

    .hero-progress{
      margin-top:22px;
      background:rgba(255,255,255,.14);
      border:1px solid rgba(255,255,255,.24);
      border-radius:24px;
      padding:18px;
      backdrop-filter:blur(8px);
      box-shadow:0 10px 22px rgba(0,0,0,.10);
      position:relative;
      overflow:hidden;
      animation:pulseCard 2.6s infinite ease-in-out;
    }

    .hero-progress::before{
      content:"";
      position:absolute;
      inset:-20%;
      background:radial-gradient(circle, rgba(255,255,255,.22) 0%, rgba(255,255,255,0) 60%);
      opacity:.35;
      animation:pulseGlow 2.6s infinite ease-in-out;
      pointer-events:none;
    }

    .hero-progress-top{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-bottom:10px;
      flex-wrap:wrap;
      position:relative;
      z-index:1;
    }

    .hero-progress-label{
      font-weight:900;
      font-size:1.15rem;
      letter-spacing:.2px;
    }

    .hero-progress-value{
      font-weight:900;
      font-size:1.15rem;
      background:rgba(255,255,255,.16);
      border:1px solid rgba(255,255,255,.26);
      padding:8px 12px;
      border-radius:999px;
      white-space:nowrap;
      position:relative;
      z-index:1;
    }

    .bar{
      width:100%;
      height:24px;
      border-radius:999px;
      background:rgba(255,255,255,.22);
      overflow:hidden;
      border:1px solid rgba(255,255,255,.28);
      position:relative;
      z-index:1;
    }

    .fill{
      width:0%;
      height:100%;
      border-radius:999px;
      background:linear-gradient(90deg,#ffe66d,#ffca3a,#8ce99a,#51c97f);
      transition:width .3s ease;
      box-shadow:0 0 24px rgba(255,255,255,.35) inset;
      position:relative;
      overflow:hidden;
    }

    .fill::after{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(120deg, transparent 0%, rgba(255,255,255,.35) 45%, transparent 100%);
      transform:translateX(-100%);
      animation:shine 2.8s infinite linear;
    }

    .hero-progress-note{
      margin-top:10px;
      font-size:.95rem;
      color:rgba(255,255,255,.95);
      line-height:1.5;
      font-weight:600;
      position:relative;
      z-index:1;
    }

    .grid{
      display:grid;
      grid-template-columns:1.15fr .85fr;
      gap:20px;
      margin-top:22px;
    }

    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:22px;
    }

    .card h2{
      margin:0 0 12px;
      font-size:1.35rem;
    }

    .sub{
      color:var(--muted);
      margin:0 0 18px;
      line-height:1.6;
    }

    .goal-list,
    .reward-list,
    .step-list,
    .admin-list{
      display:grid;
      gap:12px;
    }

    .item{
      border:1px solid var(--line);
      border-radius:18px;
      padding:16px;
      background:#fbfdff;
    }

    .item strong{
      display:block;
      font-size:1rem;
      margin-bottom:6px;
    }

    .category-title{
      margin:18px 0 10px;
      font-size:1rem;
      font-weight:900;
      color:var(--brand);
      text-transform:uppercase;
      letter-spacing:.6px;
    }

    .points-box{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:12px;
      margin-top:16px;
    }

    .points{
      background:linear-gradient(180deg,#f8fbff,#eef5ff);
      border:1px solid #d7e6fb;
      border-radius:18px;
      padding:18px 14px;
      text-align:center;
    }

    .points .num{
      display:block;
      font-size:2rem;
      font-weight:800;
      color:var(--brand);
      line-height:1;
      margin-bottom:8px;
    }

    .reward-tag{
      display:inline-block;
      font-size:.82rem;
      font-weight:800;
      color:#8a5a00;
      background:#fff5db;
      border:1px solid #f4df9b;
      padding:5px 9px;
      border-radius:999px;
      margin-bottom:8px;
    }

    .warning-box{
      margin-top:18px;
      background:linear-gradient(180deg,#fff7f7,#fff1f1);
      border:2px solid #f2b6b6;
      border-radius:20px;
      padding:18px;
      box-shadow:0 6px 20px rgba(198,40,40,.08);
    }

    .warning-box h3{
      margin:0 0 8px;
      color:var(--danger);
      font-size:1.05rem;
    }

    .warning-box p{
      margin:0;
      line-height:1.65;
      color:#6d1d1d;
      font-weight:700;
    }

    .footer-note{
      margin-top:20px;
      font-size:.96rem;
      color:var(--muted);
      line-height:1.7;
    }

    .check{
      color:var(--success);
      font-weight:800;
    }

    .admin-section{
      margin-top:22px;
    }

    .admin-grid{
      display:grid;
      grid-template-columns:1fr;
      gap:20px;
      align-items:start;
    }

    .admin-panel{
      border:1px solid var(--line);
      border-radius:22px;
      padding:18px;
      background:#fbfdff;
    }

    .admin-panel label{
      display:block;
      font-weight:700;
      margin-bottom:8px;
    }

    .admin-panel input{
      width:100%;
      padding:14px 14px;
      border-radius:14px;
      border:1px solid #cfdbe8;
      font:inherit;
      margin-bottom:12px;
    }

    .btn-row{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin-top:4px;
    }

    .btn{
      border:none;
      border-radius:14px;
      padding:12px 16px;
      font:inherit;
      font-weight:800;
      cursor:pointer;
    }

    .btn-primary{
      background:var(--brand);
      color:#fff;
    }

    .btn-secondary{
      background:#eaf2ff;
      color:var(--brand);
      border:1px solid #cfe0fb;
    }

    .btn-danger{
      background:#fff1f1;
      color:var(--danger);
      border:1px solid #efc5c5;
    }

    .admin-note{
      margin-top:12px;
      color:var(--muted);
      line-height:1.6;
      font-size:.94rem;
    }

    .locked-box{
      background:#f8fbff;
      border:1px dashed #b7cbe3;
      border-radius:18px;
      padding:14px;
      margin-bottom:10px;
    }

    @keyframes pulseCard{
      0%{transform:scale(1);box-shadow:0 10px 22px rgba(0,0,0,.10);}
      50%{transform:scale(1.01);box-shadow:0 14px 30px rgba(255,255,255,.12), 0 12px 26px rgba(0,0,0,.12);}
      100%{transform:scale(1);box-shadow:0 10px 22px rgba(0,0,0,.10);}
    }

    @keyframes pulseGlow{
      0%{transform:scale(.92);opacity:.18;}
      50%{transform:scale(1.06);opacity:.42;}
      100%{transform:scale(.92);opacity:.18;}
    }

    @keyframes shine{
      0%{transform:translateX(-100%);}
      100%{transform:translateX(180%);}
    }

    @media (max-width:900px){
      .grid,.admin-grid{grid-template-columns:1fr;}
      .points-box{grid-template-columns:1fr;}
      .hero{padding:26px 20px;}
      .hero-inner{flex-direction:column-reverse;align-items:flex-start;}
      .hero-photo{width:96px;min-width:96px;height:96px;border-radius:20px;}
      .hero-progress-top{align-items:flex-start;}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <div class="hero-inner">
        <div class="hero-copy">
          <h1>Eric's Incentive Page</h1>
          <p>Build independence, make stronger choices, show respect, and stay consistent.</p>

          <div class="hero-progress">
            <div class="hero-progress-value" id="heroPointDisplay">0 / 120 points</div>
            <div class="bar"><div class="fill"></div></div>
          </div>
        </div>
      </div>
    </section>

    <section class="card admin-section">
      <input id="pointInput" type="number" />
      <button id="savePointsBtn">Save</button>
      <button id="addOneBtn">+1</button>
      <button id="addFiveBtn">+5</button>
      <button id="minusOneBtn">-1</button>
      <button id="resetPointsBtn">Reset</button>
    </section>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://bqanjupmcgydvmfgvutx.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_J6Y49EQarV5pAzhOdokl7w_GVlPoPSb';

    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const targetPoints = 120;
    const fill = document.querySelector('.fill');
    const display = document.getElementById('heroPointDisplay');
    const input = document.getElementById('pointInput');

    let rowId = null;
    let current = 0;

    function render(p){
      current = p;
      display.textContent = p + ' / ' + targetPoints + ' points';
      fill.style.width = Math.min((p/targetPoints)*100,100)+'%';
      input.value = p;
    }

    async function load(){
      const { data } = await supabaseClient.from('participant_points').select('*').eq('name','Eric').single();
      rowId = data.id;
      render(data.points);
    }

    async function update(p){
      await supabaseClient.from('participant_points').update({points:p}).eq('id',rowId);
    }

    document.getElementById('savePointsBtn').onclick=()=>update(Number(input.value));
    document.getElementById('addOneBtn').onclick=()=>update(current+1);
    document.getElementById('addFiveBtn').onclick=()=>update(current+5);
    document.getElementById('minusOneBtn').onclick=()=>update(current-1);
    document.getElementById('resetPointsBtn').onclick=()=>update(0);

    supabaseClient.channel('live').on('postgres_changes',{event:'UPDATE',schema:'public',table:'participant_points'},payload=>{
      if(payload.new.name==='Eric'){render(payload.new.points);}
    }).subscribe();

    load();
  </script>
</body>
</html>
