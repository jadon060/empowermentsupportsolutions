<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Omar's Incentive Page</title>
  <style>
    :root{
      --bg:#f4f7fb;
      --card:#ffffff;
      --ink:#10233a;
      --muted:#5f7187;
      --line:#dbe4ee;
      --brand:#1f5fa8;
      --brand-2:#4f8fe0;
      --success:#1f9d55;
      --success-2:#51c97f;
      --warn:#f59e0b;
      --danger:#c62828;
      --shadow:0 12px 35px rgba(16,35,58,.10);
      --radius:22px;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      background:linear-gradient(180deg,#eef4fb 0%, #f8fbff 100%);
      color:var(--ink);
    }

    .wrap{
      max-width:1100px;
      margin:0 auto;
      padding:28px 18px 48px;
    }

    .hero{
      background:linear-gradient(135deg,var(--brand),var(--brand-2));
      color:#fff;
      border-radius:30px;
      padding:32px 26px;
      box-shadow:var(--shadow);
      position:relative;
      overflow:hidden;
      min-height:320px;
    }

    .hero::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        radial-gradient(circle at 15% 20%, rgba(255,255,255,.14), transparent 24%),
        radial-gradient(circle at 80% 18%, rgba(255,255,255,.12), transparent 18%),
        radial-gradient(circle at 85% 85%, rgba(255,255,255,.09), transparent 20%);
      pointer-events:none;
    }

    .hero::after{
      content:"";
      position:absolute;
      width:220px;
      height:220px;
      right:-40px;
      top:-40px;
      border-radius:50%;
      background:rgba(255,255,255,.12);
    }

    .hero-inner{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:20px;
      position:relative;
      z-index:2;
    }

    .hero-copy{
      max-width:760px;
      flex:1 1 auto;
    }

    .hero h1{
      margin:0 0 10px;
      font-size:clamp(2rem,4vw,3rem);
      line-height:1.05;
    }

    .hero p{
      margin:0;
      max-width:720px;
      font-size:1.05rem;
      line-height:1.6;
      color:rgba(255,255,255,.95);
    }

    .hero-photo{
      width:128px;
      min-width:128px;
      height:128px;
      border-radius:24px;
      overflow:hidden;
      border:4px solid rgba(255,255,255,.85);
      box-shadow:0 12px 24px rgba(0,0,0,.18);
      background:rgba(255,255,255,.15);
      backdrop-filter:blur(6px);
    }

    .hero-photo img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }

    .hero-badges{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin-top:18px;
    }

    .badge{
      background:rgba(255,255,255,.16);
      border:1px solid rgba(255,255,255,.22);
      color:#fff;
      padding:10px 14px;
      border-radius:999px;
      font-weight:700;
      font-size:.95rem;
      backdrop-filter:blur(4px);
    }

    .hero-progress{
      margin-top:22px;
      background:rgba(255,255,255,.14);
      border:1px solid rgba(255,255,255,.24);
      border-radius:24px;
      padding:18px;
      backdrop-filter:blur(8px);
      box-shadow:0 10px 22px rgba(0,0,0,.10);
      position:relative;
      overflow:hidden;
      animation:pulseCard 2.6s infinite ease-in-out;
    }

    .hero-progress::before{
      content:"";
      position:absolute;
      inset:-20%;
      background:radial-gradient(circle, rgba(255,255,255,.22) 0%, rgba(255,255,255,0) 60%);
      opacity:.35;
      animation:pulseGlow 2.6s infinite ease-in-out;
      pointer-events:none;
    }

    .hero-progress-top{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-bottom:10px;
      flex-wrap:wrap;
      position:relative;
      z-index:1;
    }

    .hero-progress-label{
      font-weight:900;
      font-size:1.15rem;
      letter-spacing:.2px;
    }

    .hero-progress-value{
      font-weight:900;
      font-size:1.15rem;
      background:rgba(255,255,255,.16);
      border:1px solid rgba(255,255,255,.26);
      padding:8px 12px;
      border-radius:999px;
      white-space:nowrap;
      position:relative;
      z-index:1;
    }

    .bar{
      width:100%;
      height:24px;
      border-radius:999px;
      background:rgba(255,255,255,.22);
      overflow:hidden;
      border:1px solid rgba(255,255,255,.28);
      position:relative;
      z-index:1;
    }

    .fill{
      width:0%;
      height:100%;
      border-radius:999px;
      background:linear-gradient(90deg,#ffe66d,#ffca3a,#8ce99a,#51c97f);
      transition:width .3s ease;
      box-shadow:0 0 24px rgba(255,255,255,.35) inset;
      position:relative;
      overflow:hidden;
    }

    .fill::after{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(120deg, transparent 0%, rgba(255,255,255,.35) 45%, transparent 100%);
      transform:translateX(-100%);
      animation:shine 2.8s infinite linear;
    }

    .hero-progress-note{
      margin-top:10px;
      font-size:.95rem;
      color:rgba(255,255,255,.95);
      line-height:1.5;
      font-weight:600;
      position:relative;
      z-index:1;
    }

    .grid{
      display:grid;
      grid-template-columns:1.15fr .85fr;
      gap:20px;
      margin-top:22px;
    }

    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:22px;
    }

    .card h2{
      margin:0 0 12px;
      font-size:1.35rem;
    }

    .sub{
      color:var(--muted);
      margin:0 0 18px;
      line-height:1.6;
    }
