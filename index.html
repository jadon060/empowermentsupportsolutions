<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Empowerment Support Solutions, LLC</title>
  <link rel="icon" href="logo full.png" type="image/png" />
  <style>
    :root {
      --brand:#2c3e50; 
      --brand-2:#0f4c81;
      --bg:linear-gradient(180deg,#f9fbff 0%,#f3f6fc 100%);
      --card:#ffffff; 
      --text:#2a2a2a;
      --accent:#4c8cd7;

      --header-a:#1b7ea0;
      --header-b:#2fb6a6;
    }

    * { box-sizing: border-box; }

    body {
      margin:0;
      font-family: "Segoe UI", Arial, Helvetica, sans-serif;
      background:var(--bg);
      color:var(--text);
      line-height:1.6;
      scroll-behavior:smooth;
    }

    header {
      background: linear-gradient(120deg, var(--header-a), var(--header-b), var(--header-a));
      background-size: 300% 300%;
      animation: gradientPulse 10s ease-in-out infinite;
      color:#fff;
      text-align:center;
      padding: 18px 22px;
      padding-top: calc(60px + env(safe-area-inset-top));
      box-shadow:0 3px 12px rgba(0,0,0,0.15);
      position: relative;
    }

    header h1 { 
      margin:0; 
      font-size:1.55rem; 
      letter-spacing:.2px;
      line-height:1.15;
    }

    .header-inner{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:14px;
      max-width:1200px;
      margin:0 auto;
    }

    @keyframes gradientPulse {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .login-btn {
      position: fixed;
      right: 16px;
      bottom: 16px;
      background: var(--accent);
      color: #fff;
      font-weight: 600;
      font-size: 0.9rem;
      padding: 9px 15px;
      border-radius: 8px;
      text-decoration: none;
      border: none;
      box-shadow: 0 4px 10px rgba(0,0,0,0.25);
      transition: all 0.25s ease;
      z-index: 9999;
    }

    .login-btn:hover { background:#336fb4; transform: translateY(-3px); }

    .careers-btn{
      position:absolute; 
      left:16px; 
      top:16px;
      background:var(--accent);
      color:#fff;
      font-weight:600;
      font-size:0.9rem;
      padding:9px 15px;
      border-radius:8px;
      text-decoration:none;
      border:none;
      box-shadow:0 4px 10px rgba(0,0,0,0.25);
      z-index: 2;
    }

    .logo-center {
      display:block;
      margin: 26px auto 10px auto;
      max-width: 260px;
      height:auto;
    }

    .section {
      max-width:1200px;
      margin:25px auto;
      padding:20px;
      background:rgba(255,255,255,0.8);
      border-radius:14px;
    }

    .section h2 {
      color:var(--brand-2);
      margin-bottom:12px;
      font-size:1.8rem;
      border-left:6px solid var(--accent);
      padding-left:10px;
    }

    .service-cards {
      display:grid;
      grid-template-columns:repeat(3,minmax(300px,1fr));
      gap:24px;
    }

    .card {
      background:var(--card);
      border-radius:12px;
      padding:22px;
      border-top:4px solid var(--accent);
    }

    #team .team-photo {
      display:inline-block;
      width:43%;
      max-width:420px;
      margin:10px 8px 16px 8px;
      vertical-align:top;
    }

    @media (max-width:850px){
      #team .team-photo{
        width:88%;
        max-width:520px;
        display:block;
        margin:10px auto 16px auto;
      }
    }

    footer {
      background:linear-gradient(135deg,var(--brand),var(--brand-2));
      color:#fff;
      text-align:center;
      padding:40px 20px;
      margin-top:50px;
    }

    .testimonial {
      max-width:720px;
      margin:0 auto 10px auto;
      padding:0 16px;
      text-align:center;
      color:#444;
      font-style:italic;
    }

  </style>
</head>
<body>

<header>
  <a href="https://empowermentss.com/careers/careers.html?_ts=1" class="careers-btn">Careers</a>
  <div class="header-inner">
    <h1>Empowerment Support Solutions, LLC</h1>
  </div>
</header>

<img src="logo full.png" alt="ESS Logo" class="logo-center">

<section id="team" class="section" style="text-align:center;">

  <!-- ORIGINAL IMAGES (UNCHANGED) -->
  <img src="unnamed%20(1).jpg" alt="ESS staff photo (library)" class="team-photo">
  <img src="Screenshot%202026-01-21%20112803.png" alt="ESS team photo (restaurant)" class="team-photo">

  <!-- ✅ NEW IMAGES ADDED (FROM YOUR GITHUB UPLOADS) -->
  <img src="unnamed.jpg" alt="ESS additional photo 1" class="team-photo">
  <img src="unnamed%20(1).jpg" alt="ESS additional photo 2" class="team-photo">

  <p class="testimonial">
    “I've noticed a real difference since working with ESS. They take feedback seriously and focus on what actually helps.”
  </p>

</section>

<footer>
  <h2>Contact Us</h2>
  <p><strong>Phone:</strong> 626-596-6155</p>
  <p><strong>Email:</strong> <a href="mailto:Empowermentess@gmail.com">empowermentess@gmail.com</a></p>
</footer>

<a href="/login.html" class="login-btn">Login</a>

</body>
</html>
